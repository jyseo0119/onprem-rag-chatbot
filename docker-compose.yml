# Local infrastructure for the RAG demo.
#
#   docker compose up -d qdrant          # default demo (API LLM path)
#   docker compose --profile onprem up   # + vLLM (Qwen2.5) on-prem path
#
# vLLM lives behind the `onprem` profile so the default `up` stays light
# and does not require a GPU.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: onprem-rag-qdrant
    ports:
      - "6333:6333"   # REST / dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # On-prem LLM serving. Requires an NVIDIA GPU + nvidia-container-toolkit.
  # Enabled only with:  docker compose --profile onprem up
  vllm:
    image: vllm/vllm-openai:latest
    container_name: onprem-rag-vllm
    profiles: ["onprem"]
    ports:
      # Host 8001 so it does not collide with the FastAPI backend on 8000.
      # In-container vLLM still serves on 8000 (see VLLM_BASE_URL).
      - "8001:8000"
    command: >
      --model Qwen/Qwen2.5-7B-Instruct
      --served-model-name Qwen/Qwen2.5-7B-Instruct
      --max-model-len 8192
    volumes:
      - hf_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qdrant_storage:
  hf_cache:
